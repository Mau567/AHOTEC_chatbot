<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AHOTEC chat — local embed preview</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        margin: 2rem;
        max-width: 40rem;
        line-height: 1.5;
      }
      code {
        font-size: 0.9em;
      }
    </style>
  </head>
  <body>
    <h1>Local embed preview</h1>
    <p>
      This page loads <code>/embed.js</code> from your dev server (same origin as the iframe). Use it to verify
      embed behavior without deploying or committing.
    </p>
    <p>Run <code>npm run dev</code>, then open this file at <code>http://localhost:3000/embed-preview.html</code>.</p>
    <!-- No async: embed.js uses document.currentScript to resolve the app origin -->
    <script src="/embed.js"></script>
  </body>
</html>
